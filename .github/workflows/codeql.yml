name: CodeQL (SAST)

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read
  security-events: write
  id-token: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Initialize CodeQL
        id: init
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Create SARIF output directory
        if: always()
        run: |
          mkdir -p sarif-out

      - name: Perform CodeQL Analysis
        if: steps.init.outcome == 'success'
        uses: github/codeql-action/analyze@v4
        with:
          upload: false
          upload-database: false
          output: sarif-out

      - name: List SARIF outputs
        if: always()
        run: |
          ls -la sarif-out || true

      - name: Upload CodeQL SARIF (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif
          path: sarif-out/*.sarif
          if-no-files-found: ignore
          retention-days: 30

      - name: Sign CodeQL SARIF
        if: always()
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          shopt -s nullglob
          if ! compgen -G "sarif-out/*.sarif" > /dev/null; then
            echo "No SARIF files found in sarif-out/; skipping signing"
            exit 0
          fi
          for f in sarif-out/*.sarif; do
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              "$f"
          done

      - name: Verify CodeQL SARIF signatures
        if: always()
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          shopt -s nullglob
          if ! compgen -G "sarif-out/*.sarif" > /dev/null; then
            echo "No SARIF files found in sarif-out/; skipping verification"
            exit 0
          fi
          for f in sarif-out/*.sarif; do
            if [ ! -f "${f}.bundle" ]; then
              echo "Missing bundle for ${f}; skipping"
              continue
            fi
            cosign verify-blob \
              --bundle "${f}.bundle" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.*$" \
              "$f"
          done

      - name: Upload CodeQL signatures
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif-signatures
          path: |
            sarif-out/*.sarif.bundle
          if-no-files-found: ignore
          retention-days: 30
